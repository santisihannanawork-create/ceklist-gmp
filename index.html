<!DOCTYPE html>

<head>

    <title>Aplikasi Checklist GMP Offline</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #f3f4f6; }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        /* Menghilangkan arrow spinner default pada input number di Chrome/Android agar rapi */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="text-gray-800 antialiased font-sans">

    <!-- Header -->
    <header class="bg-blue-700 text-white p-4 shadow-md sticky-header flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold">Checklist Audit GMP</h1>
            <p class="text-xs text-blue-200">Kepatuhan Standar Mutu &amp; Kuantitas Temuan</p>
        </div>
        <div class="flex gap-2">
            <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-2 rounded shadow font-semibold transition">
                Download Excel
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-4 max-w-4xl mx-auto pb-24">
        <!-- Metadata Form -->
        <div class="bg-white p-4 rounded-lg shadow mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Tanggal Audit</label>
                <input type="date" id="audit-date" class="w-full border p-2 rounded text-sm focus:outline-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Area / Ruangan</label>
                <input type="text" id="audit-area" placeholder="Misal: Ruang Proses Koji" class="w-full border p-2 rounded text-sm focus:outline-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Auditor</label>
                <input type="text" id="audit-person" placeholder="Nama Auditor" class="w-full border p-2 rounded text-sm focus:outline-blue-500">
            </div>
        </div>

        <!-- Form Pertanyaan -->
        <form id="gmp-form" class="space-y-6">
            <!-- Kontainer Kategori akan di-render otomatis oleh JavaScript -->
            <div id="questions-container" class="space-y-6"></div>
        </form>

        <!-- Reset Button Section -->
        <div class="mt-8 text-center">
            <button onclick="resetForm()" class="text-xs text-red-500 hover:text-red-700 underline cursor-pointer bg-none border-none p-0">
                Hapus semua data / Reset Form
            </button>
        </div>
    </main>

        // Render Formulir secara otomatis dengan input jumlah temuan
        const container = document.getElementById('questions-container');
        gmpData.forEach(category => {
            let catBlock = document.createElement('div');
            catBlock.className = "bg-white p-4 rounded-lg shadow space-y-4";
            catBlock.innerHTML = `<h2 class="text-md font-bold text-blue-800 border-b pb-2">${category.title}</h2>`;

            category.questions.forEach(q => {
                const num = q.split(" ")[0];
                const qKey = num.replace(".", "_"); // Key unik untuk ID elemen
                let qDiv = document.createElement('div');
                qDiv.className = "py-3 border-b border-gray-100 last:border-0 flex flex-col gap-2";
                qDiv.innerHTML = `
                    <p class="text-sm font-medium text-gray-700">${q}</p>
                    <div class="flex flex-wrap items-center gap-3 mt-1">
                        <!-- Input Jumlah Temuan -->
                        <div class="flex items-center gap-1.5">
                            <span class="text-xs font-semibold text-gray-500">Temuan:</span>
                            <input type="number" id="count_${qKey}" min="0" placeholder="0" 
                                class="w-16 text-center text-sm border p-1.5 rounded focus:outline-blue-500 font-bold bg-gray-50"
                                oninput="handleCountInput('${qKey}')">
                        </div>

                        <!-- Checkbox N/A -->
                        <label class="inline-flex items-center text-sm cursor-pointer border px-2 py-1.5 rounded bg-gray-50 hover:bg-gray-100 select-none">
                            <input type="checkbox" id="na_${qKey}" class="form-checkbox text-blue-600 focus:ring-blue-500 rounded" 
                                onchange="handleNaCheckbox('${qKey}')">
                            <span class="ml-1.5 text-xs font-bold text-gray-600">N/A</span>
                        </label>

                        <!-- Input Keterangan -->
                        <input type="text" id="note_${qKey}" placeholder="Keterangan / Temuan Tindakan Koreksi..." 
                            class="flex-1 min-w-[200px] text-xs border p-1.5 rounded focus:outline-blue-500" oninput="saveToLocalStorage()">
                    </div>
                `;
                catBlock.appendChild(qDiv);
            });
            container.appendChild(catBlock);
        });

        // Logika ketika input angka jumlah temuan diisi
        function handleCountInput(qKey) {
            const countInput = document.getElementById(`count_${qKey}`);
            const naCheckbox = document.getElementById(`na_${qKey}`);
            
            // Jika user mengisi angka, otomatis hilangkan centang N/A
            if (countInput.value !== "") {
                naCheckbox.checked = false;
            }
            saveToLocalStorage();
        }

        // Logika ketika checkbox N/A ditekan
        function handleNaCheckbox(qKey) {
            const countInput = document.getElementById(`count_${qKey}`);
            const naCheckbox = document.getElementById(`na_${qKey}`);
            
            // Jika N/A dicentang, kosongkan input jumlah temuan
            if (naCheckbox.checked) {
                countInput.value = "";
            }
            saveToLocalStorage();
        }

        // Simpan data input secara real-time ke LocalStorage (Fitur Offline Persistence)
        function saveToLocalStorage() {
            const formData = {
                date: document.getElementById('audit-date').value,
                area: document.getElementById('audit-area').value,
                person: document.getElementById('audit-person').value,
                responses: {}
            };

            gmpData.forEach(category => {
                category.questions.forEach(q => {
                    const num = q.split(" ")[0];
                    const qKey = num.replace(".", "_");
                    
                    formData.responses[qKey] = {
                        count: document.getElementById(`count_${qKey}`).value,
                        na: document.getElementById(`na_${qKey}`).checked,
                        note: document.getElementById(`note_${qKey}`).value
                    };
                });
            });
            localStorage.setItem('gmp_checklist_data', JSON.stringify(formData));
        }

        // Muat kembali data dari LocalStorage saat halaman dibuka kembali
        function loadFromLocalStorage() {
            const savedData = localStorage.getItem('gmp_checklist_data');
            if (!savedData) return;
            const parsed = JSON.parse(savedData);
            
            document.getElementById('audit-date').value = parsed.date || "";
            document.getElementById('audit-area').value = parsed.area || "";
            document.getElementById('audit-person').value = parsed.person || "";

            gmpData.forEach(category => {
                category.questions.forEach(q => {
                    const num = q.split(" ")[0];
                    const qKey = num.replace(".", "_");
                    if(parsed.responses[qKey]) {
                        const res = parsed.responses[qKey];
                        document.getElementById(`count_${qKey}`).value = res.count || "";
                        document.getElementById(`na_${qKey}`).checked = res.na || false;
                        document.getElementById(`note_${qKey}`).value = res.note || "";
                    }
                });
            });
        }

        // Reset Formulir
        function resetForm() {
            if (confirm("Apakah Anda yakin ingin menghapus semua data checklist saat ini?")) {
                localStorage.removeItem('gmp_checklist_data');
                document.getElementById('gmp-form').reset();
                document.getElementById('audit-date').value = "";
                document.getElementById('audit-area').value = "";
                document.getElementById('audit-person').value = "";
                alert("Formulir berhasil direset.");
                window.scrollTo(0,0);
            }
        }

        // Fungsi Export ke File Excel (.xls) - Hanya Angka Temuan atau N/A
        function exportToExcel() {
            const date = document.getElementById('audit-date').value || '-';
            const area = document.getElementById('audit-area').value || '-';
            const person = document.getElementById('audit-person').value || '-';

            let tableHtml = `
                <table border="1">
                    <tr style="background-color:#1d4ed8; color:white;">
                        <th colspan="4" style="font-size:16px; font-weight:bold; height:30px;">LAPORAN AUDIT CHECKLIST GMP</th>
                    </tr>
                    <tr><td><b>Tanggal Audit:</b></td><td>${date}</td><td><b>Auditor:</b></td><td>${person}</td></tr>
                    <tr><td><b>Area Evaluasi:</b></td><td colspan="3">${area}</td></tr>
                    <tr></tr>
                    <tr style="background-color:#f3f4f6; font-weight:bold;">
                        <th width="80">No Poin</th>
                        <th width="420">Poin Pengecekan Spesifik</th>
                        <th width="120">Hasil Evaluasi / Jml Temuan</th>
                        <th width="300">Keterangan / Tindakan Koreksi</th>
                    </tr>
            `;

            gmpData.forEach(category => {
                tableHtml += `
                    <tr style="background-color:#e5e7eb; font-weight:bold;">
                        <td colspan="4">${category.title}</td>
                    </tr>
                `;
                category.questions.forEach(q => {
                    const num = q.split(" ")[0];
                    const text = q.replace(num, "").trim();
                    const qKey = num.replace(".", "_");
                    
                    const countVal = document.getElementById(`count_${qKey}`).value;
                    const isNa = document.getElementById(`na_${qKey}`).checked;
                    const note = document.getElementById(`note_${qKey}`).value;

                    let hasilEvaluasi = "";

                    if (isNa) {
                        hasilEvaluasi = "N/A";
                    } else {
                        // Jika kosong atau diisi 0, keluarkan angka 0. Jika ada temuan, keluarkan jumlah angkanya.
                        hasilEvaluasi = countVal === "" ? 0 : parseInt(countVal);
                    }

                    tableHtml += `
                        <tr>
                            <td align="center">${num}</td>
                            <td>${text}</td>
                            <td align="center" style="font-weight:bold;">${hasilEvaluasi}</td>
                            <td>${note}</td>
                        </tr>
                    `;
                });
            });

            tableHtml += `</table>`;

            const dataType = 'application/vnd.ms-excel';
            const filename = `GMP_Checklist_${area.replace(/[^a-zA-Z0-9]/g, "_")}_${date}.xls`;
            const downloadLink = document.createElement("a");
            document.body.appendChild(downloadLink);
            
            if(navigator.msSaveOrOpenBlob){
                const blob = new Blob(['\ufeff' + tableHtml], { type: dataType });
                navigator.msSaveOrOpenBlob(blob, filename);
            } else {
                downloadLink.href = 'data:' + dataType + ', ' + encodeURIComponent(tableHtml);
                downloadLink.download = filename;
                downloadLink.click();
            }
        }

        window.onload = loadFromLocalStorage;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker terdaftar."))
            .catch(err => console.log("Gagal mendaftarkan Service Worker:", err));
        }
    </script>
